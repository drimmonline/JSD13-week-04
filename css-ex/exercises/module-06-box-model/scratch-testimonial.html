<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scratch — Testimonial Card</title>
    <link rel="stylesheet" href="scratch-testimonial.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav class="navbar">
      <ul>
        <li class="logo">QUOAT A DAY</li>
        <li>HOME</li>
        <li>QUOAT</li>
        <li>ABOUT</li>
      </ul>
    </nav>
    <div class="hero-image">
      <img src="/assets/dog.jpg" alt="dog" />
      <div class="hero-text">
        <h1>แอบหลับ</h1>
        <p>นอนน้อยก็ง่วงนอนมากก็ง่วง</p>
      </div>
    </div>
    <div class="testimonial">
      <p class="testimonial__quote">
        "This product changed the way I work. Incredible experience from start
        to finish."
      </p>
      <div class="testimonial__author">
        <img
          class="testimonial__avatar"
          src="https://placehold.co/60"
          alt="Sarah"
        />
        <div class="testimonial__info">
          <strong class="testimonial__name">Sarah Johnson</strong>
          <span class="testimonial__role">CEO, TechStart</span>
        </div>
      </div>
    </div>
  </body>
</html>
